cat > deploy/common/systemd/hardening/10-defaults.conf <<'EOF'
[Service]
# Conservative defaults; tighten per-service as you validate.
NoNewPrivileges=true
PrivateTmp=true
ProtectHome=true

# The app writes only to these paths.
ReadWritePaths=/var/log/rollingthunder /var/lib/rollingthunder

Restart=on-failure
RestartSec=2
EOF
