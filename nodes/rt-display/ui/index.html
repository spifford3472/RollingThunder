<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RollingThunder — rt-display</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 0; background: #0b0f14; color: #e6edf3; }
    .wrap { padding: 24px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { background: #111826; border: 1px solid #223043; border-radius: 12px; padding: 16px; min-width: 280px; flex: 1; }
    .title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    .muted { color: #9fb0c0; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid #223043; }
    .ok { background: rgba(46, 160, 67, 0.18); border-color: rgba(46, 160, 67, 0.55); }
    .bad { background: rgba(248, 81, 73, 0.18); border-color: rgba(248, 81, 73, 0.55); }
    .warn { background: rgba(219, 158, 52, 0.18); border-color: rgba(219, 158, 52, 0.55); }
    tr.sev-ok  td { background: rgba(46, 160, 67, 0.06); }
    tr.sev-warn td { background: rgba(219, 158, 52, 0.06); }
    tr.sev-bad td { background: rgba(248, 81, 73, 0.06); }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: #c9d1d9; }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 10px; }
    .kv div { padding: 2px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #223043; vertical-align: top; }
    th { color: #9fb0c0; font-weight: 700; }
    .small { font-size: 12px; color: #9fb0c0; }

    .drift-table { width: 100%; border-collapse: collapse; }
    .drift-table th, .drift-table td { padding: 6px 8px; border-bottom: 1px solid #3333; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .drift-ok   .state { font-weight: 700; }
    .drift-warn .state { font-weight: 700; }
    .drift-bad  .state { font-weight: 800; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="card">
        <p class="title">RollingThunder — rt-display</p>
        <div class="kv">
          <div class="muted">Endpoint</div><div id="endpoint"></div>
          <div class="muted">Poll interval</div><div id="interval"></div>
          <div class="muted">Now</div><div id="now"></div>
          <div class="muted">Last success</div><div id="lastOk"></div>
          <div class="muted">Last error</div><div id="lastErr"></div>
        </div>
        <div style="margin-top:12px;">
          <span id="status" class="pill bad">BOOTING</span>
        </div>
      </div>

      <div class="card">
        <p class="title">Nodes</p>
        <div id="nodes" class="muted">No nodes yet.</div>
      </div>

      <div class="card">
        <p class="title">Deploy / Drift</p>
        <div class="kv" style="margin-bottom:8px;">
          <div class="muted">Endpoint</div><div id="deployEndpoint" class="mono"></div>
          <div class="muted">Last success</div><div id="deployLastOk"></div>
          <div class="muted">Last error</div><div id="deployLastErr"></div>
        </div>
        <div id="deploy" class="muted">No deploy report yet.</div>
      </div>

      <div class="card">
        <p class="title">Payload</p>
        <pre id="payload">{}</pre>
      </div>
    </div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const url = params.get("url") || "./health.json";
  const pollMs = Math.max(250, Number(params.get("ms") || 1000));
  const deployUrl = params.get("deployUrl") || "http://rt-controller:8625/api/v1/ui/deploy";
  const deployMs = Math.max(500, Number(params.get("deployMs") || 2000));


  const el = {
    endpoint: document.getElementById("endpoint"),
    interval: document.getElementById("interval"),
    now: document.getElementById("now"),
    lastOk: document.getElementById("lastOk"),
    lastErr: document.getElementById("lastErr"),
    status: document.getElementById("status"),
    payload: document.getElementById("payload"),
    nodes: document.getElementById("nodes"),
    deployEndpoint: document.getElementById("deployEndpoint"),
    deployLastOk: document.getElementById("deployLastOk"),
    deployLastErr: document.getElementById("deployLastErr"),
    deploy: document.getElementById("deploy"),
  };

  el.endpoint.textContent = url;
  el.interval.textContent = `${pollMs} ms`;
  
  el.deployEndpoint.textContent = deployUrl;
  el.deployLastOk.textContent = "-";
  el.deployLastErr.textContent = "-";

  let lastOk = "-";
  let lastErr = "-";

  function setStatus(ok, label) {
    el.status.textContent = label;
    el.status.classList.toggle("ok", ok);
    el.status.classList.toggle("bad", !ok);
  }

  async function fetchWithTimeout(resource, timeoutMs) {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const resp = await fetch(resource, { signal: controller.signal, cache: "no-store" });
      return resp;
    } finally {
      clearTimeout(t);
    }
  }

  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
    }[c]));
  }

  function classifyNode(n) {
    const id = n.id || n.node_id || "";
    const roleRaw = (n.role || "").toString();
    const role = roleRaw.toLowerCase();
    const host = n.hostname || "";
    const ip = n.ip || (n.net && n.net.ip) || "";

    const ageRaw = n.age_sec ?? n.last_seen_age_sec ?? n.age;
    const ageNum = Number(ageRaw);
    const age = Number.isFinite(ageNum) ? Math.max(0, Math.floor(ageNum)) : "";

    const statusRaw = String(n.status || "").toLowerCase().trim();
    let status = statusRaw;

    if (!isCanonicalStatus(status)) {
      status = "stale";
    }

    let sev =
      status === "online" ? "ok" :
      status === "stale"  ? "warn" :
      "bad";

    const statusLabel =
      status === "online" ? "Online" :
      status === "stale"  ? `Stale (${age === "" ? "?" : age}s)` :
      `Offline (${age === "" ? "?" : age}s)`;

    const badges = [];

    if (statusRaw && statusRaw !== status) {
      badges.push({ sev: "warn", label: `unknown_status:${statusRaw}` });
      if (sev === "ok") sev = "warn";
    }

    // ui_render_ok only meaningful for display nodes (and only degrades)
    const renderOk = (n.ui_render_ok ?? n.ui?.render_ok);
    if (role === "display" && (status === "online" || status === "stale" || !statusRaw)) {
      if (renderOk === true) badges.push({ sev: "ok", label: "UI OK" });
      else if (renderOk === false) {
        badges.push({ sev: "warn", label: "UI degraded" });
        if (sev === "ok") sev = "warn";
      } else {
        badges.push({ sev: "warn", label: "UI unknown" });
      }
    }

    const pubErr = (n.publisher_error ?? "").toString().trim();
    if (pubErr) {
      badges.push({ sev: "warn", label: "publisher_error" });
      if (sev === "ok") sev = "warn";
    }

    return { id, role: roleRaw, host, ip, age, sev, statusLabel, badges };
  }


  function pill(sev, label) {
    sev = (sev || "").toString().trim();
    const cls =
      sev === "ok" ? "pill ok" :
      sev === "warn" ? "pill warn" :
      "pill bad";
    return `<span class="${cls}">${esc(label)}</span>`;
  }

  function isCanonicalStatus(s) {
    return s === "online" || s === "stale" || s === "offline";
  }

  function validateNodeShape(n) {
    // returns array of strings describing issues (empty => ok)
    const issues = [];
    if (!n || typeof n !== "object") return ["node_not_object"];

    const id = n.id || n.node_id;
    if (!id) issues.push("missing:id");

    if (!("role" in n)) issues.push("missing:role");

    const statusRaw = String(n.status || "").toLowerCase();
    if (!statusRaw) issues.push("missing:status");
    else if (!isCanonicalStatus(statusRaw)) issues.push(`bad:status:${statusRaw}`);

    if (!("age_sec" in n)) issues.push("missing:age_sec");
    if (!("last_seen_ms" in n)) issues.push("missing:last_seen_ms");
    if (!("last_update_ms" in n)) issues.push("missing:last_update_ms");

    return issues;
  }

  function renderNodes(data) {
    // Accept:
    //  A) { nodes: {...} } or { data: { nodes: {...} } } (map)
    //  B) { data: { nodes: [ ... ] } } (array)  <-- your current payload
    const raw = data?.nodes ?? data?.data?.nodes;

    if (!raw) {
      el.nodes.innerHTML = `<div class="muted">Not a nodes payload.</div>`;
      return;
    }

    let list = [];

    if (Array.isArray(raw)) {
      // array of node objects
      list = raw.filter(Boolean);
    } else if (typeof raw === "object") {
      // map keyed by node id
      const ids = Object.keys(raw).sort();
      list = ids.map((id) => ({ id, ...(raw[id] || {}) }));
    } else {
      el.nodes.innerHTML = `<div class="muted">Not a nodes payload.</div>`;
      return;
    }

    if (list.length === 0) {
      el.nodes.innerHTML = `<div class="muted">No nodes reported.</div>`;
      return;
    }

    // Stable sort by id
    list.sort((a, b) => String(a.id || "").localeCompare(String(b.id || "")));

    const rows = list.map((n) => {
      const issues = validateNodeShape(n);
      const m = classifyNode(n);

      if (issues.length) {
        m.badges.push({ sev: "warn", label: "SCHEMA VIOLATION" });
        m.badges.push({ sev: "warn", label: issues.slice(0, 2).join(",") });
        if (m.sev === "ok") m.sev = "warn";
      }

      const badgeHtml = m.badges.length
        ? `<div class="small" style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
            ${m.badges.map(b => pill(b.sev, b.label)).join("")}
          </div>`
        : "";

      const sevClass = (m.sev === "ok" || m.sev === "warn" || m.sev === "bad") ? m.sev : "warn";

      return `
        <tr class="sev-${sevClass}">
          <td>
            <div><strong>${esc(m.id)}</strong></div>
            <div class="small">${esc(m.role)}${m.host ? " — " + esc(m.host) : ""}</div>
          </td>
          <td>
            ${pill(m.sev, m.statusLabel)}
            ${badgeHtml}
          </td>
          <td>${esc(m.ip || "-")}</td>
          <td>${esc(m.age === "" ? "-" : m.age)}</td>
        </tr>
      `;
    }).join("");


    el.nodes.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Node</th>
            <th>Status</th>
            <th>IP</th>
            <th>Age (sec)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderDeploy(payload) {
    const nodes = payload?.data?.nodes || [];
    if (!Array.isArray(nodes) || nodes.length === 0) {
      el.deploy.innerHTML = `<div class="muted">No deploy reports yet.</div>`;
      return;
    }

    // stable by id
    nodes.sort((a,b) => String(a.id||"").localeCompare(String(b.id||"")));

    const rows = nodes.map(n => {
      const d = n.deploy || {};
      const drift = n.drift || {};
      const state = (drift.state || "warn").toString();
      const reasons = Array.isArray(drift.reasons) ? drift.reasons.join(", ") : "";
      const commit = d.deployed_commit || "-";
      const age = (d.report_age_sec ?? "-");

      const trClass =
        state === "ok" ? "drift-ok" :
        state === "warn" ? "drift-warn" :
        "drift-bad";

      return `
        <tr class="${trClass}">
          <td class="mono">${esc(n.id || "-")}</td>
          <td>${esc(n.role || "-")}</td>
          <td class="mono">${esc(commit)}</td>
          <td>${esc(age)}s</td>
          <td class="state">${esc(state)}</td>
          <td>${esc(reasons || "")}</td>
        </tr>
      `;
    }).join("");

    el.deploy.innerHTML = `
      <table class="drift-table">
        <thead>
          <tr>
            <th>Node</th>
            <th>Role</th>
            <th>Commit</th>
            <th>Age</th>
            <th>Drift</th>
            <th>Reasons</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function tickDeploy() {
    try {
      const resp = await fetchWithTimeout(deployUrl, Math.max(2000, deployMs + 800));
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      el.deployLastOk.textContent = new Date().toLocaleTimeString();
      el.deployLastErr.textContent = "-";
      renderDeploy(data);
    } catch (e) {
      el.deployLastErr.textContent =
        `${new Date().toLocaleTimeString()} — ${e.name || "Error"}: ${e.message || e}`;
      // keep last good table if we have one; only show message if empty
      if (!el.deploy.innerHTML || el.deploy.innerHTML.includes("No deploy")) {
        el.deploy.innerHTML = `<div class="muted">Deploy data unavailable.</div>`;
      }
    }
  }


  async function tick() {
    el.now.textContent = new Date().toLocaleString();

    try {
      const resp = await fetchWithTimeout(url, Math.max(2000, Math.min(4000, pollMs + 500)));
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      lastOk = new Date().toLocaleTimeString();
      el.lastOk.textContent = lastOk;
      lastErr = "-";
      el.lastErr.textContent = lastErr;

      el.payload.textContent = JSON.stringify(data, null, 2);
      renderNodes(data);

      setStatus(true, "ONLINE");
    } catch (e) {
      lastErr = `${new Date().toLocaleTimeString()} — ${e.name || "Error"}: ${e.message || e}`;
      el.lastErr.textContent = lastErr;
      el.nodes.innerHTML = `<div class="muted">No data (offline).</div>`;
      setStatus(false, "OFFLINE");
    }
  }

  tick();
  setInterval(tick, pollMs);
  setInterval(tickDeploy, deployMs);
})();
</script>
</body>
</html>
